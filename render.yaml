services:
  - type: web
    name: yt-clip-service
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MAX_CONCURRENT_JOBS
        value: "1"
      - key: MAX_HEIGHT
        value: "720"
      - key: MAX_CLIP_SECONDS
        value: "600"
      - key: YTDLP_TIMEOUT
        value: "180"
      # Opcional: proxy para reducir riesgo de bloqueo por IP compartida de Render
      # - key: YTDLP_PROXY
      #   value: "http://usuario:password@host:puerto"
      # Opcional: cookies.txt en base64 (alternativa a Secret File)
      # - key: YTDLP_COOKIES_B64
      #   sync: false
